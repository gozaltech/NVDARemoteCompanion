name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  
env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows builds
          - os: windows-latest
            platform: windows
            arch: x64
            executable: nvda_remote_companion.exe
            cmake_arch: x64
            vcvars_arch: x64
          # Linux builds
          - os: ubuntu-latest
            platform: linux
            arch: x64
            executable: nvda_remote_companion
            cmake_arch: x86_64
            cc: gcc
            cxx: g++

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Linux dependencies
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libspeechd-dev libbrlapi-dev

    - name: Setup MSVC (Windows)
      if: matrix.platform == 'windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.vcvars_arch }}

    - name: Configure CMake (Windows)
      if: matrix.platform == 'windows'
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Configure CMake (Linux)
      if: matrix.platform == 'linux'
      run: |
        export CC="${{ matrix.cc }}"
        export CXX="${{ matrix.cxx }}"
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Prepare artifacts (Windows)
      if: matrix.platform == 'windows'
      run: |
        mkdir -p artifacts
        cp build/bin/${{ matrix.executable }} artifacts/
        cp build/bin/nvdaControllerClient.dll artifacts/

    - name: Prepare artifacts (Linux)
      if: matrix.platform == 'linux'
      run: |
        mkdir -p artifacts
        cp build/bin/${{ matrix.executable }} artifacts/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nvda_remote_companion-${{ matrix.platform }}-${{ matrix.arch }}
        path: artifacts/

  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v4

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "No keystore provided"
          exit 0
        fi
        echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
        echo "KEYSTORE_FILE=$RUNNER_TEMP/keystore.jks" >> "$GITHUB_ENV"

    - name: Build release APK and AAB
      working-directory: android
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease bundleRelease

    - name: Rename AAB
      run: |
        VERSION=$(ls android/app/build/outputs/apk/release/NVDARemoteCompanion-*.apk \
                  | sed 's/.*NVDARemoteCompanion-\(.*\)\.apk/\1/')
        cp android/app/build/outputs/bundle/release/app-release.aab \
           android/app/build/outputs/bundle/release/NVDARemoteCompanion-${VERSION}.aab

    - name: Upload APK artifact
      uses: actions/upload-artifact@v7
      with:
        archive: false
        path: android/app/build/outputs/apk/release/NVDARemoteCompanion-*.apk

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v7
      with:
        archive: false
        path: android/app/build/outputs/bundle/release/NVDARemoteCompanion-*.aab

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Generate release notes
      id: notes
      run: |
        CURRENT_TAG="${GITHUB_REF_NAME}"
        PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n1)
        if [ -n "$PREV_TAG" ]; then
          RANGE="${PREV_TAG}..${CURRENT_TAG}"
        else
          RANGE="${CURRENT_TAG}"
        fi
        NOTES=$(git log "$RANGE" --pretty=format:"- %B%n---" --no-merges)
        {
          echo "body<<EOF"
          echo "$NOTES"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Download Windows x64 artifacts
      uses: actions/download-artifact@v8
      with:
        name: nvda_remote_companion-windows-x64
        path: windows-x64/

    - name: Download Linux x64 artifacts
      uses: actions/download-artifact@v8
      with:
        name: nvda_remote_companion-linux-x64
        path: linux-x64/

    - name: Download Android APK
      uses: actions/download-artifact@v8
      with:
        pattern: NVDARemoteCompanion-*.apk
        path: android-apk/
        merge-multiple: true

    - name: Download Android AAB
      uses: actions/download-artifact@v8
      with:
        pattern: NVDARemoteCompanion-*.aab
        path: android-aab/
        merge-multiple: true

    - name: Create release archives
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        cd windows-x64
        zip -r ../nvda_remote_companion-windows-x64-${VERSION}.zip .

        cd ../linux-x64
        tar -czf ../nvda_remote_companion-linux-x64-${VERSION}.tar.gz .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: false
        body: ${{ steps.notes.outputs.body }}
        files: |
          nvda_remote_companion-windows-x64*.zip
          nvda_remote_companion-linux-x64*.tar.gz
          android-apk/*.apk
          android-aab/*.aab